<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>Claude RTL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      background: #0d0d0d;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #e8e8e8;
      padding: 20px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #cc785c, #d4976a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .title-block h1 {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .title-block p {
      font-size: 10px;
      color: #666;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #222;
      margin-bottom: 18px;
    }

    /* ─── Toggle Button ─── */
    .toggle-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .toggle-btn {
      position: relative;
      width: 200px;
      height: 54px;
      border-radius: 27px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      overflow: hidden;
    }

    .toggle-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transition: opacity 0.3s ease;
    }

    .toggle-btn.off {
      background: #1e1e1e;
      color: #555;
      border: 1.5px solid #2a2a2a;
      box-shadow: none;
    }

    .toggle-btn.off:hover {
      background: #252525;
      border-color: #3a3a3a;
      color: #888;
    }

    .toggle-btn.on {
      background: linear-gradient(135deg, #cc785c 0%, #d4976a 50%, #c9845a 100%);
      color: #fff;
      border: 1.5px solid transparent;
      box-shadow:
        0 0 20px rgba(204, 120, 92, 0.4),
        0 0 40px rgba(204, 120, 92, 0.15),
        0 4px 15px rgba(204, 120, 92, 0.3);
    }

    .toggle-btn.on:hover {
      box-shadow:
        0 0 25px rgba(204, 120, 92, 0.55),
        0 0 50px rgba(204, 120, 92, 0.2),
        0 6px 20px rgba(204, 120, 92, 0.4);
      transform: translateY(-1px);
    }

    .toggle-btn.on:active,
    .toggle-btn.off:active {
      transform: scale(0.97) translateY(0);
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-icon {
      font-size: 18px;
      line-height: 1;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .status-badge.off {
      background: #222;
      color: #444;
      border: 1px solid #2d2d2d;
    }

    .status-badge.on {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .hint {
      font-size: 10px;
      color: #3a3a3a;
      text-align: center;
      line-height: 1.6;
    }

    .hint.active {
      color: #666;
    }

    /* pulse ring when ON */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(204, 120, 92, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(204, 120, 92, 0); }
      100% { box-shadow: 0 0 0 0 rgba(204, 120, 92, 0); }
    }

    .toggle-btn.on.pulse {
      animation: pulse-ring 0.6s ease-out;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ف</div>
    <div class="title-block">
      <h1>Claude RTL</h1>
      <p>راست‌چین کردن متن فارسی</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="toggle-wrapper">
    <button class="toggle-btn off" id="toggleBtn">
      <div class="btn-inner">
        <span class="btn-icon" id="btnIcon">↰</span>
        <span id="btnText">فعال‌سازی RTL</span>
      </div>
    </button>

    <span class="status-badge off" id="statusBadge">غیرفعال</span>

    <p class="hint" id="hintText">
      دکمه را فشار دهید تا متن‌های فارسی<br/>راست‌چین شوند
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
